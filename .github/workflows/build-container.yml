name: Build and Push to ACR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    if: ${{ github.repository == 'NSLS2/holoptycho' }}
    name: Build and Push Container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH for ptycho repo access
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PTYCHO_DEPLOY_KEY }}

      - name: Azure Login (OIDC)
        if: ${{ github.event_name != 'pull_request' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        if: ${{ github.event_name != 'pull_request' }}
        run: az acr login --name nsls2hackathonacr

      - name: Build container
        run: |
          IMAGE=nsls2hackathonacr.azurecr.io/holoptycho
          DOCKER_BUILDKIT=1 docker build \
            --ssh default \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .

      - name: Push to ACR
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          IMAGE=nsls2hackathonacr.azurecr.io/holoptycho
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
